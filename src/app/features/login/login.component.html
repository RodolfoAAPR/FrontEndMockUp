<div class="flex min-h-screen flex-col justify-center px-6 py-12 lg:px-8 bg-gray-100">
  <div class="sm:mx-auto sm:w-full sm:max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-200">
    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
      <h2 class="text-center text-2xl font-bold tracking-tight text-gray-900 font-sans">Entre na sua conta</h2>
    </div>

    <div class="mt-10">
      <form action="#" method="POST" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
          <div class="mt-2">
            <input id="email" type="email" name="email" required autocomplete="email" 
              class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-purple-600 outline-none sm:text-sm transition-all" />
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-medium text-gray-700">Senha</label>
            <div class="text-sm">
              <a href="#" class="font-semibold text-purple-600 hover:text-purple-500">Esqueceu a senha?</a>
            </div>
          </div>
          <div class="mt-2">
            <input id="password" type="password" name="password" required autocomplete="current-password" 
              class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-purple-600 outline-none sm:text-sm transition-all" />
          </div>
        </div>

        <div>
          <button type="submit" 
            class="flex w-full justify-center rounded-md bg-purple-600 px-3 py-1.5 text-sm font-semibold text-white shadow-sm hover:bg-purple-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-purple-600 transition-all duration-200">
            Entrar
          </button>
        </div>
      </form>

      <p class="mt-10 text-center text-sm text-gray-500">
        Não possui uma conta?
        <a href="#" class="font-semibold text-purple-600 hover:text-purple-500">Cadastre-se aqui!</a>
      </p>
    </div>
  </div>
</div>
